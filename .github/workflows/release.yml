name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build and publish release

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build package ZIP
        run: bash build.sh

      - name: Rename ZIP to versioned name
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cp "build/pkg_kwtsms-${VERSION}.zip" "pkg_kwtsms-${VERSION}.zip" 2>/dev/null || \
          cp build/pkg_kwtsms-*.zip "pkg_kwtsms-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: kwtSMS for Joomla ${{ steps.version.outputs.tag }}
          body: |
            ## kwtSMS for Joomla ${{ steps.version.outputs.tag }}

            Install via Joomla Extensions Manager: upload `pkg_kwtsms-${{ steps.version.outputs.version }}.zip`

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: pkg_kwtsms-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

      - name: Update update.xml with new version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          cat > update.xml << 'XMLEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <updates>
              <update>
                  <name>kwtSMS for Joomla</name>
                  <description>kwtSMS SMS gateway integration for Joomla</description>
                  <element>pkg_kwtsms</element>
                  <type>package</type>
                  <version>VERSION_PLACEHOLDER</version>
                  <infourl title="kwtSMS for Joomla">https://github.com/REPO_PLACEHOLDER</infourl>
                  <downloads>
                      <downloadurl type="full" format="zip">https://github.com/REPO_PLACEHOLDER/releases/download/TAG_PLACEHOLDER/pkg_kwtsms-VERSION_PLACEHOLDER.zip</downloadurl>
                  </downloads>
                  <tags>
                      <tag>stable</tag>
                  </tags>
                  <maintainer>kwtSMS</maintainer>
                  <maintainerurl>https://www.kwtsms.com</maintainerurl>
                  <targetplatform name="joomla" version="(4|5|6)"/>
                  <php_minimum>8.1</php_minimum>
              </update>
          </updates>
          XMLEOF
          sed -i 's/^          //' update.xml
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" update.xml
          sed -i "s|TAG_PLACEHOLDER|${TAG}|g" update.xml
          sed -i "s|REPO_PLACEHOLDER|${REPO}|g" update.xml

      - name: Commit and push update.xml
        run: |
          git config user.name "kwtSMS Admin"
          git config user.email "support@kwtsms.com"
          git add update.xml
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update update.xml to ${TAG}" && git push origin HEAD:main)
        env:
          TAG: ${{ steps.version.outputs.tag }}
