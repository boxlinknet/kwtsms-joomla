name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} Syntax Check

    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, mbstring, json
          coverage: none

      - name: Check PHP syntax (all source files)
        run: find src/ -name "*.php" -print0 | xargs -0 -n1 php -l

  build:
    runs-on: ubuntu-latest
    name: Build installable ZIP

    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: bash build.sh

      - name: Verify ZIP was created
        run: ls -lh build/pkg_kwtsms-*.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg_kwtsms-dev
          path: build/pkg_kwtsms-*.zip
          retention-days: 7
